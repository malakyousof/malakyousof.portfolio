
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin — Portfolio</title>
    <style>
        body { font-family: monospace; max-width: 700px; margin: 40px auto; padding: 0 20px; }
        input, textarea { width: 100%; margin: 6px 0 14px; padding: 8px; box-sizing: border-box; }
        button { padding: 8px 18px; cursor: pointer; }
        #login-form, #admin-panel { display: none; }
        .project-row { border: 1px solid #ccc; padding: 10px; margin: 8px 0; }
    </style>
</head>
<body>

<div id="login-form">
    <h2>Admin Login</h2>
    <input id="email" type="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />
    <button onclick="login()">Login</button>
    <p id="login-error" style="color:red"></p>
</div>

<div id="admin-panel">
    <h2>Portfolio Admin</h2>
    <button onclick="logout()" style="float:right">Logout</button>

    <h3>Add Project</h3>
    <input id="title" placeholder="Title" />
    <textarea id="desc" rows="3" placeholder="Description"></textarea>
    <input id="github" placeholder="GitHub link (optional)" />
    <input id="tags" placeholder="Tags: Python, SQL, Power BI" />
    <label>Cover image: <input id="cover-file" type="file" accept="image/*" /></label>
    <label>PDF report: <input id="pdf-file" type="file" accept=".pdf" /></label>
    <button onclick="addProject()">Add Project</button>
    <p id="status"></p>

    <h3>Existing Projects</h3>
    <div id="existing-projects"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
